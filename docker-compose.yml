services:
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-youngcerti}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-youngcerti-local-password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-youngcerti}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-youngcerti-local-password}
      S3_BUCKET: ${S3_BUCKET:-young-certi-data}
      S3_QUESTIONS_KEY: ${S3_QUESTIONS_KEY:-sap-c02/questions.json}
    volumes:
      - .:/workspace:ro
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "mc alias set local http://minio:9000 \"$${MINIO_ROOT_USER}\" \"$${MINIO_ROOT_PASSWORD}\" &&
      mc mb --ignore-existing \"local/$${S3_BUCKET}\" &&
      SRC=/workspace/crawler/build/questions.json &&
      { [ -f \"$$SRC\" ] || SRC=/workspace/crawler/testdata/fixture-questions.json; } &&
      echo \"seeding questions from $$SRC\" &&
      mc cp \"$$SRC\" \"local/$${S3_BUCKET}/$${S3_QUESTIONS_KEY}\""
    restart: "no"

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-youngcerti}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-youngcerti-local-password}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_BUCKET: ${S3_BUCKET:-young-certi-data}
      S3_QUESTIONS_KEY: ${S3_QUESTIONS_KEY:-sap-c02/questions.json}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://web:5173}
    ports:
      - "8000:8000"
    volumes:
      - .:/workspace
    working_dir: /workspace/backend
    command: uvicorn young_certi_api.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    ports:
      - "5173:5173"
    volumes:
      - .:/workspace
    working_dir: /workspace/frontend
    entrypoint: []
    command: pnpm dev
    healthcheck:
      test: ["CMD", "node", "-e", "require('node:http').get('http://127.0.0.1:5173', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 20

  crawler:
    build:
      context: .
      dockerfile: crawler/Dockerfile
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-youngcerti}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-youngcerti-local-password}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}
      S3_BUCKET: ${S3_BUCKET:-young-certi-data}
      S3_QUESTIONS_KEY: ${S3_QUESTIONS_KEY:-sap-c02/questions.json}
    volumes:
      - .:/workspace
    working_dir: /workspace/crawler
    command: sleep infinity
    healthcheck:
      test: ["CMD", "go", "version"]
      interval: 10s
      timeout: 3s
      retries: 10

  tf:
    build:
      context: .
      dockerfile: infra/Dockerfile
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
    volumes:
      - .:/workspace
    working_dir: /workspace
    entrypoint: []
    command: ["sh", "-c", "while true; do sleep 3600; done"]
    healthcheck:
      test: ["CMD", "terraform", "version"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  minio-data:
