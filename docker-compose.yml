services:
  # S3 대신 로컬에서 사용할 MinIO 서비스
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      # 관리자 계정
      # 환경변수 VAR가 있으면 그 값을 쓰고, 없으면 default 사용
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-youngcerti}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-youngcerti-local-password}
    ports:
      # Host -> Container
      - "19000:9000"
      - "19001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      # Named Volume (맨 아래 확인)
      # Docker volume: -> Container path
      - minio-data:/data

  # 초기화 컨테이너
  # 필요한 데이터를 minio에 적재
  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-youngcerti}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-youngcerti-local-password}
      S3_BUCKET: ${S3_BUCKET:-young-certi-data}
      S3_QUESTIONS_KEY: ${S3_QUESTIONS_KEY:-sap-c02/questions.json}
    volumes:
      # Bind Mount
      # ~/workspace/young-certi-study: -> Container path
      - .:/workspace:ro
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "mc alias set local http://minio:9000 \"$${MINIO_ROOT_USER}\" \"$${MINIO_ROOT_PASSWORD}\" &&
      mc mb --ignore-existing \"local/$${S3_BUCKET}\" &&
      SRC=/workspace/crawler/build/questions.json &&
      { [ -f \"$$SRC\" ] || SRC=/workspace/crawler/testdata/fixture-questions.json; } &&
      echo \"seeding questions from $$SRC\" &&
      mc cp \"$$SRC\" \"local/$${S3_BUCKET}/$${S3_QUESTIONS_KEY}\""
    restart: "no"

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-youngcerti}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-youngcerti-local-password}
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://minio:9000}

      S3_BUCKET: ${S3_BUCKET:-young-certi-data}
      S3_QUESTIONS_KEY: ${S3_QUESTIONS_KEY:-sap-c02/questions.json}

      # frontend 개발 서버 주소 허용
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:15173,http://web:5173}
    ports:
      - "18000:8000"
    
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=2).read()"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:18000}
    ports:
      - "15173:5173"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('node:http').get('http://127.0.0.1:5173', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 20

# named volume 생성 - Docker Compose 기본 설정으로
volumes:
  minio-data: {}