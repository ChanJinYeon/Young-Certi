replicaCount: 1

image:
  repository: young-certi-api
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}

service:
  type: ClusterIP
  port: 8000

env:
  AWS_REGION: ap-northeast-2
  S3_BUCKET: young-certi-data
  S3_QUESTIONS_KEY: sap-c02/questions.json
  CORS_ALLOWED_ORIGINS: http://localhost:5173

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70

nodeSelector: {}
tolerations: []
affinity: {}
