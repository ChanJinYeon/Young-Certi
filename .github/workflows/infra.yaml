name: infra

on:
  pull_request:
    paths:
      - "infra/**"
      - "docker-compose.yml"
      - ".github/workflows/infra.yaml"
  push:
    branches: ["main", "001-question-practice"]
    paths:
      - "infra/**"
      - "docker-compose.yml"
      - ".github/workflows/infra.yaml"

jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build tf
      - run: docker compose run --rm tf terraform fmt -recursive -check infra
      - run: docker compose run --rm tf terraform -chdir=infra/envs/dev init -backend=false -reconfigure
      - run: docker compose run --rm tf terraform -chdir=infra/envs/dev validate
      - name: Terraform module tests
        run: |
          docker compose run --rm tf sh -c '
            cd infra/modules/s3-bucket && terraform init -backend=false && terraform test &&
            cd ../tfstate-bucket && terraform init -backend=false && terraform test &&
            cd ../data-bucket && terraform init -backend=false && terraform test &&
            cd ../vpc && terraform init -backend=false && terraform test &&
            cd ../eks && terraform init -backend=false && terraform test &&
            cd ../github-oidc && terraform init -backend=false && terraform test &&
            cd ../frontend-cdn && terraform init -backend=false && terraform test
          '
      - run: docker compose run --rm tf sh -c 'cd infra/envs/dev && terraform test && tflint && checkov -d .'
      - run: docker compose run --rm tf terraform -chdir=infra/envs/dev plan -input=false -no-color
      - run: docker compose run --rm tf terraform -chdir=infra/envs/dev plan -input=false -no-color -var enable_frontend_cdn=true
