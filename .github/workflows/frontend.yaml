name: frontend

on:
  pull_request:
    paths:
      - "frontend/**"
      - "docker-compose.yml"
      - ".github/workflows/frontend.yaml"
  push:
    branches: ["main", "001-question-practice"]
    paths:
      - "frontend/**"
      - "docker-compose.yml"
      - ".github/workflows/frontend.yaml"

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build web
      - run: docker compose run --rm web pnpm install --frozen-lockfile
      - run: docker compose run --rm web pnpm lint
      - run: docker compose run --rm web pnpm test
      - run: docker compose run --rm web pnpm typecheck
      - run: docker compose run --rm web pnpm build
