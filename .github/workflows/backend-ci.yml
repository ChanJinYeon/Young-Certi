name: backend-ci

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - "specs/001-question-practice/contracts/openapi.yaml"
      - ".github/workflows/backend-ci.yml"

  workflow_dispatch:

permissions:
  contents: write   # repo 코드를 수정할 수 있는 권한 -> kustomization.yaml 수정해야 하기 때문 (image:tag)
  id-token: write   # GitHub OIDC 토큰을 발급받아 AWS IAM Role을 assume하기 위한 권한

jobs:
  test-build-push:
    name: Test, build, and push backend image
    runs-on: ubuntu-latest

    steps:
    # repo 코드 받기
      - name: Checkout
        uses: actions/checkout@v5

    # python 설치
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

    # 의존성 설치
      - name: Install backend dependencies
        working-directory: backend
        run: |  # pyproject.toml의 [dev] optional dependencies 설치
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # backend 코드는 Docker 실행 환경 기준으로 /workspace/specs/... 경로의 OpenAPI 계약 파일을 읽음
      # GitHub Actions runner의 checkout 경로는 /home/runner/work/... 이므로 테스트 전에 같은 경로를 만들어줌
      - name: Prepare OpenAPI contract path
        run: |
          sudo mkdir -p /workspace/specs/001-question-practice/contracts
          sudo cp specs/001-question-practice/contracts/openapi.yaml \
            /workspace/specs/001-question-practice/contracts/openapi.yaml

      # pytest 실행 (테스트 실패 시 중단)
      - name: Run backend tests
        working-directory: backend
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_REGION: ap-northeast-2
          S3_BUCKET: test-bucket
          S3_QUESTIONS_KEY: test/questions.json
        run: pytest

      # AWS 인증
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.BACKEND_AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # ECR 로그인 (임시 AWS credentials)
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 이미지 빌드 (태그로 관리)
      # build context는 repo root이므로 -f backend/Dockerfile 지정 필수
      # {{ github.sha }}: commit-sha
      - name: Build image
        run: |
          docker build \
            -f backend/Dockerfile \
            -t "${{ vars.BACKEND_ECR_REPOSITORY_URL }}:${{ github.sha }}" \
            .

      # ECR에 push
      - name: Push image
        run: |
          docker push "${{ vars.BACKEND_ECR_REPOSITORY_URL }}:${{ github.sha }}"

      # kustomize 설치
      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      # kustomize에서 image, tag 업데이트
      - name: Update backend image tag
        run: |
          cd k8s/backend
          kustomize edit set image young-certi-backend=${{ vars.BACKEND_ECR_REPOSITORY_URL }}:${{ github.sha }}

      # kubernetes manifest 업데이트 (kustomization.yaml - image:tag)
      - name: Commit backend manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add k8s/backend/kustomization.yaml

          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi

          git commit -m "chore(gitops): deploy backend ${{ github.sha }}"
          git push origin HEAD:main