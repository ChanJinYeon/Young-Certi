name: crawler

on:
  pull_request:
    paths:
      - "crawler/**"
      - "docker-compose.yml"
      - ".github/workflows/crawler.yaml"
  push:
    branches: ["main", "001-question-practice"]
    paths:
      - "crawler/**"
      - "docker-compose.yml"
      - ".github/workflows/crawler.yaml"

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build crawler
      - run: docker compose run --rm crawler sh -c 'test -z "$(gofmt -l .)"'
      - run: docker compose run --rm crawler go vet ./...
      - run: docker compose run --rm crawler go test ./...
      - run: docker compose run --rm crawler go build ./cmd/crawl-sap-c02
