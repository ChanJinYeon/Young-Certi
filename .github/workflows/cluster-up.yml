name: cluster-up

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type create-eks to acknowledge AWS cost."
        required: true
        type: string

jobs:
  apply:
    if: inputs.confirm == 'create-eks'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      TF_BACKEND_BUCKET: young-certi-dev-${{ vars.AWS_ACCOUNT_ID }}-ap-northeast-2-tfstate
      TF_BACKEND_KEY: dev/terraform.tfstate
      TF_BACKEND_REGION: ap-northeast-2
      TF_VAR_account_id: ${{ vars.AWS_ACCOUNT_ID }}
      TF_VAR_enable_ephemeral_cluster: "true"
      TF_VAR_skip_credentials_validation: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2
      - run: docker compose build tf
      - name: Configure Terraform backend
        run: |
          cat > infra/envs/dev/backend.generated.tf <<'EOF'
          terraform {
            backend "s3" {}
          }
          EOF
      - name: Terraform init
        run: |
          docker compose run --rm \
            -e TF_BACKEND_BUCKET \
            -e TF_BACKEND_KEY \
            -e TF_BACKEND_REGION \
            tf sh -c 'terraform -chdir=infra/envs/dev init \
              -backend-config="bucket=${TF_BACKEND_BUCKET}" \
              -backend-config="key=${TF_BACKEND_KEY}" \
              -backend-config="region=${TF_BACKEND_REGION}" \
              -backend-config="encrypt=true" \
              -backend-config="use_lockfile=true"'
      - name: Apply AWS and Karpenter controller
        run: |
          TF_VAR_manage_karpenter_manifests=false docker compose run --rm \
            -e TF_VAR_account_id \
            -e TF_VAR_enable_ephemeral_cluster \
            -e TF_VAR_skip_credentials_validation \
            -e TF_VAR_manage_karpenter_manifests \
            tf terraform -chdir=infra/envs/dev apply -auto-approve
      - name: Apply Karpenter NodePool
        run: |
          TF_VAR_manage_karpenter_manifests=true docker compose run --rm \
            -e TF_VAR_account_id \
            -e TF_VAR_enable_ephemeral_cluster \
            -e TF_VAR_skip_credentials_validation \
            -e TF_VAR_manage_karpenter_manifests \
            tf terraform -chdir=infra/envs/dev apply -auto-approve
