name: backend

on:
  pull_request:
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - ".github/workflows/backend.yaml"
  push:
    branches: ["main", "001-question-practice"]
    paths:
      - "backend/**"
      - "docker-compose.yml"
      - ".github/workflows/backend.yaml"

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - run: docker compose build api
      - run: docker compose run --rm api ruff check .
      - run: docker compose run --rm api mypy
      - run: docker compose run --rm api pytest
      - run: docker build -f backend/Dockerfile -t young-certi-api:${{ github.sha }} .
      - uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: young-certi-api:${{ github.sha }}
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif
