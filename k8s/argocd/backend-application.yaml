apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: young-certi-backend
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/ChanJinYeon/Young-Certi.git
    targetRevision: main
    path: k8s/backend

  destination:
    server: https://kubernetes.default.svc
    namespace: young-certi

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true